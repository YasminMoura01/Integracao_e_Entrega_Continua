<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <main class="page-shell">
        <section class="panel">
            <div class="section-title">
                <h1>Cadastro de Alunos</h1>
            </div>

            <form class="form-card" th:action="@{/alunos/salvar}" method="post" th:object="${aluno}">
                <input type="hidden" th:field="*{idAluno}">

                <div class="field-grid">
                    <div class="field">
                        <label>Nome do Aluno</label>
                        <input type="text" th:field="*{nomeAluno}">
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="text" th:field="*{emailAluno}">
                    </div>
                    <div class="field">
                        <label>Telefone</label>
                        <input type="text" th:field="*{telefoneAluno}">
                    </div>
                    <div class="field">
                        <label>Endereço</label>
                        <input type="text" th:field="*{enderecoAluno}">
                    </div>
                    <div class="field">
                        <label>CPF</label>
                        <input type="text" th:field="*{cpfAluno}">
                    </div>
                    <div class="field">
                        <label>RA</label>
                        <input type="text" th:field="*{raAluno}">
                    </div>
                </div>

                <div class="button-row">
                    <input type="submit" value="Salvar">
                    <a class="button-secondary" href="/alunos/listar">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
