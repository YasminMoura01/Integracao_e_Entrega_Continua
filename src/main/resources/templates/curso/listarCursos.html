<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Cursos</title>
</head>
<body>
    <h1 style="text-align: center;">Listagem de Cursos</h1>
    <h3 style="text-align: center;">
        <a href="/cursos/criar">Criar Novo Curso</a>
    </h3>
    <table align="center" border="1">
        <tr>
            <th>Nome do Curso</th>
            <th>Período</th>
            <th>Carga Horária</th>
            <th colspan="2">Ações</th>
        </tr>
        <tr th:each="curso : ${cursos}">
            <td th:text="${curso.nome}">*</td>
            <td th:text="${curso.periodo}">*</td>
            <td th:text="${curso.cargaHoraria}">*</td>
            <td>
                <a th:href="@{/cursos/editar/{id}(id=${curso.id})}">Editar</a> |
                <a th:href="@{/cursos/excluir/{id}(id=${curso.id})}">Excluir</a>
            </td>
        </tr>
    </table>
</body>
</html>
