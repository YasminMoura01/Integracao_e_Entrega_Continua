<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Disciplinas</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <main class="page-shell">
        <section class="panel">
            <div class="section-title">
                <h1>Listagem de Disciplinas</h1>
                <div class="button-row">
                    <a class="pill-link" href="/disciplinas/criar">Criar Nova Disciplina</a>
                    <a class="button-secondary" href="/">Voltar</a>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <tr>
                        <th>Nome da Disciplina</th>
                        <th>Sigla</th>
                        <th>Carga Horária</th>
                        <th>Ações</th>
                    </tr>
                    <tr th:each="disciplina : ${disciplinas}">
                        <td th:text="${disciplina.nomeDisciplina}">*</td>
                        <td th:text="${disciplina.siglaDisciplina}">*</td>
                        <td th:text="${disciplina.cargaHorariaDisciplina}">*</td>
                        <td class="actions">
                            <a th:href="@{/disciplinas/editar/{id}(id=${disciplina.idDisciplina})}">Editar</a>
                            <a th:href="@{/disciplinas/excluir/{id}(id=${disciplina.idDisciplina})}">Excluir</a>
                        </td>
                    </tr>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
